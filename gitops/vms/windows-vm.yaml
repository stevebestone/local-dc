---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: windows-os-disk
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 60Gi
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: windows-vm
  labels:
    app: windows-vm
    os.template.kubevirt.io/win11: "true"
spec:
  runStrategy: Manual
  template:
    metadata:
      labels:
        kubevirt.io/vm: windows-vm
    spec:
      domain:
        cpu:
          cores: 4
          threads: 2
          model: host-passthrough
        resources:
          requests:
            memory: 8Gi
        features:
          acpi: {}
          hyperv:
            relaxed: {}
            vapic: {}
            spinlocks:
              spinlocks: 8191
            synic: {}
            reset: {}
            vpindex: {}
            frequencies: {}
            reenlightenment: {}
            tlbflush: {}
            ipi: {}
        clock:
          utc: {}
          timer:
            hpet:
              present: false
            pit:
              tickPolicy: delay
            rtc:
              tickPolicy: catchup
            hyperv: {}
        firmware:
          bootloader:
            efi:
              secureBoot: false
        machine:
          type: q35
        devices:
          disks:
            - name: osdisk
              disk:
                bus: virtio
              bootOrder: 1
          inputs:
            - name: tablet
              type: tablet
              bus: usb
          interfaces:
            - name: default
              masquerade: {}
              model: virtio
          tpm: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: osdisk
          persistentVolumeClaim:
            claimName: windows-os-disk
