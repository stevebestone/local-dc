# Lightweight Linux VM for quick KubeVirt verification
# Usage:
#   kubectl apply -f linux-demo-vm.yaml
#   virtctl start linux-demo
#   virtctl console linux-demo
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: linux-demo
  labels:
    app: linux-demo
spec:
  runStrategy: Manual
  template:
    metadata:
      labels:
        kubevirt.io/vm: linux-demo
    spec:
      domain:
        cpu:
          cores: 1
          model: host-passthrough
        resources:
          requests:
            memory: 128Mi
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/kubevirt/cirros-container-disk-demo:latest
