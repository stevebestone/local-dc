apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubevirt-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stevebestone/local-dc.git
    targetRevision: main
    path: gitops/kubevirt-manager
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
