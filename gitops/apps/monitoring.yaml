apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 72.*
    helm:
      values: |
        grafana:
          adminUser: admin
          adminPassword: ""
          existingSecret: grafana-admin
          grafana.ini:
            server:
              root_url: http://192.168.1.105:30084
            auth:
              disable_login_form: false
            auth.generic_oauth:
              enabled: true
              name: Keycloak
              allow_sign_up: true
              client_id: grafana
              client_secret: grafana-secret-change-me
              scopes: openid profile email groups
              auth_url: http://192.168.1.105:30083/realms/local-dc/protocol/openid-connect/auth
              token_url: http://192.168.1.105:30083/realms/local-dc/protocol/openid-connect/token
              api_url: http://192.168.1.105:30083/realms/local-dc/protocol/openid-connect/userinfo
              role_attribute_path: contains(groups[*], 'admins') && 'Admin' || 'Viewer'
          service:
            type: NodePort
            nodePort: 30084
          sidecar:
            dashboards:
              enabled: true
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  folder: ''
                  type: file
                  options:
                    path: /var/lib/grafana/dashboards/default
        prometheus:
          prometheusSpec:
            retention: 7d
            resources:
              requests:
                memory: 512Mi
                cpu: 250m
              limits:
                memory: 2Gi
                cpu: 1000m
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
        alertmanager:
          enabled: false
        nodeExporter:
          enabled: true
        kubeStateMetrics:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
