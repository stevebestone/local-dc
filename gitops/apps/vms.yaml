apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vms
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  project: default
  source:
    repoURL: https://github.com/stevebestone/local-dc.git
    targetRevision: main
    path: gitops/vms
  destination:
    server: https://kubernetes.default.svc
    namespace: developers
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
