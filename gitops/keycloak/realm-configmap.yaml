apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: keycloak
data:
  local-dc-realm.json: |
    {
      "realm": "local-dc",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "bruteForceProtected": true,
      "clientScopes": [
        {
          "name": "profile",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "true"
          },
          "protocolMappers": [
            {
              "name": "given name",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "firstName",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "given_name",
                "jsonType.label": "String"
              }
            },
            {
              "name": "family name",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "lastName",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "family_name",
                "jsonType.label": "String"
              }
            },
            {
              "name": "username",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "username",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "preferred_username",
                "jsonType.label": "String"
              }
            }
          ]
        },
        {
          "name": "email",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "true"
          },
          "protocolMappers": [
            {
              "name": "email",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "email",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "email",
                "jsonType.label": "String"
              }
            },
            {
              "name": "email verified",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "emailVerified",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "email_verified",
                "jsonType.label": "boolean"
              }
            }
          ]
        },
        {
          "name": "groups",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "true"
          },
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "consentRequired": false,
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            }
          ]
        },
        {
          "name": "roles",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "false",
            "display.on.consent.screen": "true"
          }
        }
      ],
      "roles": {
        "realm": [
          {
            "name": "admin",
            "description": "Platform administrator"
          },
          {
            "name": "developer",
            "description": "Developer role"
          },
          {
            "name": "platform-admin",
            "description": "Platform administrator service account for OIDC integration"
          }
        ]
      },
      "groups": [
        {
          "name": "admins",
          "realmRoles": [
            "admin"
          ]
        },
        {
          "name": "engineers",
          "realmRoles": [
            "developer"
          ]
        },
        {
          "name": "platform-admins",
          "realmRoles": [
            "admin",
            "platform-admin"
          ]
        }
      ],
      "users": [
        {
          "username": "platform-admin",
          "email": "platform-admin@localdc.dev",
          "firstName": "Platform",
          "lastName": "Admin",
          "enabled": true,
          "serviceAccountClientId": null,
          "credentials": [
            {
              "type": "password",
              "value": "${env.PLATFORM_ADMIN_PASSWORD:changeme}",
              "temporary": false
            }
          ],
          "groups": [
            "platform-admins",
            "admins"
          ],
          "realmRoles": [
            "admin",
            "platform-admin"
          ]
        },
        {
          "username": "steve",
          "email": "steve@localdc.dev",
          "firstName": "Steve",
          "lastName": "Bechstein",
          "enabled": true,
          "credentials": [
            {
              "type": "password",
              "value": "${env.DEFAULT_USER_PASSWORD:changeme}",
              "temporary": true
            }
          ],
          "groups": [
            "admins"
          ],
          "realmRoles": [
            "admin"
          ]
        },
        {
          "username": "engineer1",
          "email": "engineer1@localdc.dev",
          "firstName": "Engineer",
          "lastName": "One",
          "enabled": true,
          "credentials": [
            {
              "type": "password",
              "value": "${env.DEFAULT_USER_PASSWORD:changeme}",
              "temporary": true
            }
          ],
          "groups": [
            "engineers"
          ],
          "realmRoles": [
            "developer"
          ]
        },
        {
          "username": "engineer2",
          "email": "engineer2@localdc.dev",
          "firstName": "Engineer",
          "lastName": "Two",
          "enabled": true,
          "credentials": [
            {
              "type": "password",
              "value": "${env.DEFAULT_USER_PASSWORD:changeme}",
              "temporary": true
            }
          ],
          "groups": [
            "engineers"
          ],
          "realmRoles": [
            "developer"
          ]
        },
        {
          "username": "engineer3",
          "email": "engineer3@localdc.dev",
          "firstName": "Engineer",
          "lastName": "Three",
          "enabled": true,
          "credentials": [
            {
              "type": "password",
              "value": "${env.DEFAULT_USER_PASSWORD:changeme}",
              "temporary": true
            }
          ],
          "groups": [
            "engineers"
          ],
          "realmRoles": [
            "developer"
          ]
        },
        {
          "username": "engineer4",
          "email": "engineer4@localdc.dev",
          "firstName": "Engineer",
          "lastName": "Four",
          "enabled": true,
          "credentials": [
            {
              "type": "password",
              "value": "${env.DEFAULT_USER_PASSWORD:changeme}",
              "temporary": true
            }
          ],
          "groups": [
            "engineers"
          ],
          "realmRoles": [
            "developer"
          ]
        },
        {
          "username": "engineer5",
          "email": "engineer5@localdc.dev",
          "firstName": "Engineer",
          "lastName": "Five",
          "enabled": true,
          "credentials": [
            {
              "type": "password",
              "value": "${env.DEFAULT_USER_PASSWORD:changeme}",
              "temporary": true
            }
          ],
          "groups": [
            "engineers"
          ],
          "realmRoles": [
            "developer"
          ]
        }
      ],
      "clients": [
        {
          "clientId": "backstage",
          "name": "Backstage IDP",
          "enabled": true,
          "publicClient": false,
          "secret": "${env.BACKSTAGE_OIDC_SECRET:backstage-secret-change-me}",
          "redirectUris": [
            "http://192.168.1.105:30081/*",
            "http://localhost:30081/*"
          ],
          "webOrigins": [
            "*"
          ],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "protocol": "openid-connect",
          "defaultClientScopes": [
            "profile",
            "email",
            "roles"
          ],
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "realm-roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "config": {
                "multivalued": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "realm_roles",
                "userinfo.token.claim": "true"
              }
            }
          ]
        },
        {
          "clientId": "argocd",
          "name": "ArgoCD",
          "enabled": true,
          "publicClient": false,
          "secret": "${env.ARGOCD_OIDC_SECRET:argocd-secret-change-me}",
          "redirectUris": [
            "http://192.168.1.105:30082/auth/callback",
            "http://localhost:30082/auth/callback"
          ],
          "webOrigins": [
            "*"
          ],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "protocol": "openid-connect",
          "defaultClientScopes": [
            "profile",
            "email",
            "groups"
          ]
        },
        {
          "clientId": "grafana",
          "name": "Grafana",
          "enabled": true,
          "publicClient": false,
          "secret": "${env.GRAFANA_OIDC_SECRET:grafana-secret-change-me}",
          "redirectUris": [
            "http://192.168.1.105:30084/*",
            "http://localhost:30084/*"
          ],
          "webOrigins": [
            "*"
          ],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "protocol": "openid-connect",
          "defaultClientScopes": [
            "profile",
            "email"
          ],
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            }
          ]
        },
        {
          "clientId": "harbor",
          "name": "Harbor Registry",
          "enabled": true,
          "publicClient": false,
          "secret": "${env.HARBOR_OIDC_SECRET:harbor-secret-change-me}",
          "redirectUris": [
            "http://192.168.1.105:30085/*",
            "http://localhost:30085/*"
          ],
          "webOrigins": [
            "*"
          ],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "protocol": "openid-connect",
          "defaultClientScopes": [
            "profile",
            "email"
          ],
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
      ]
    }
