apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-app-config
  namespace: backstage
data:
  app-config.yaml: |
    app:
      title: Local DC - Developer Portal
      baseUrl: http://localhost:3000

    organization:
      name: Local Datacenter

    backend:
      baseUrl: http://localhost:7007
      listen:
        port: 7007
      csp:
        connect-src: ["'self'", 'http:', 'https:']
      cors:
        origin: http://localhost:3000
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      database:
        client: better-sqlite3
        connection: ':memory:'

    auth:
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true

    catalog:
      rules:
        - allow: [Component, System, API, Resource, Location, Template, User, Group]
      locations:
        - type: file
          target: /app/templates/linux-dev-vm.yaml
        - type: file
          target: /app/templates/windows-dev-vm.yaml
        - type: file
          target: /app/templates/custom-vm.yaml

    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - url: https://kubernetes.default.svc
              name: local-dc
              authProvider: serviceAccount
              skipTLSVerify: true
              skipMetricsLookup: false
              customResources:
                - group: kubevirt.io
                  apiVersion: v1
                  plural: virtualmachines
                - group: kubevirt.io
                  apiVersion: v1
                  plural: virtualmachineinstances
