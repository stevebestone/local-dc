apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  url: http://192.168.1.105:30082
  oidc.config: |
    name: Keycloak
    issuer: http://192.168.1.105:30083/realms/local-dc
    clientID: argocd
    clientSecret: argocd-secret
    requestedScopes:
      - openid
      - profile
      - email
      - groups
