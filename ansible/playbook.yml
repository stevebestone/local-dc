---
# Datacenter-in-a-Box: Bootstrap Playbook
# Handles host-level setup only. Everything else is managed by ArgoCD.
- name: Datacenter Bootstrap
  hosts: localhost
  become: true
  gather_facts: true

  vars:
    kubevirt_stable_url: https://storage.googleapis.com/kubevirt-prow/release/kubevirt/kubevirt/stable.txt
    k3s_kubeconfig: /etc/rancher/k3s/k3s.yaml
    gitops_dir: "{{ playbook_dir }}/../gitops"
    deploy_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"
    deploy_home: "{{ lookup('env', 'HOME') if ansible_env.SUDO_USER is not defined else '/home/' + deploy_user }}"
    repo_url: https://github.com/stevebestone/local-dc.git
    is_ostree: "{{ ansible_pkg_mgr == 'atomic_container' or (lookup('pipe', 'command -v rpm-ostree 2>/dev/null || true', errors='ignore') | default('') | length > 0) }}"

  pre_tasks:
    - name: Verify hardware virtualization
      ansible.builtin.shell: grep -qE '(vmx|svm)' /proc/cpuinfo
      changed_when: false
      failed_when: false
      register: virt_check

    - name: Fail if no VT-x/AMD-V
      ansible.builtin.fail:
        msg: "CPU does not support VT-x/AMD-V. Enable it in BIOS."
      when: virt_check.rc != 0

    - name: Load KVM module
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop: [kvm_intel, kvm_amd]
      failed_when: false

    - name: Verify /dev/kvm
      ansible.builtin.stat:
        path: /dev/kvm
      register: kvm_dev

    - name: Fail if /dev/kvm unavailable
      ansible.builtin.fail:
        msg: "/dev/kvm not available. Enable VT-x in BIOS."
      when: not kvm_dev.stat.exists

    - name: Check memory
      ansible.builtin.assert:
        that: ansible_memtotal_mb >= 7500
        fail_msg: "At least 8 GB RAM required."

  tasks:
    # ─── System deps + Podman (Debian) ─────────────────────────────
    - name: Install deps (Debian/Ubuntu)
      when: ansible_os_family == "Debian"
      block:
        - name: Remove Docker
          ansible.builtin.apt:
            name: [docker.io, docker-ce, docker-ce-cli, containerd.io]
            state: absent
          failed_when: false

        - name: Install Podman and virt packages
          ansible.builtin.apt:
            name: [curl, podman, qemu-utils, qemu-system-x86, libvirt-daemon-system, virtinst, bridge-utils]
            state: present
            update_cache: true

    # ─── System deps + Podman (Fedora) ─────────────────────────────
    - name: Install deps (Fedora)
      when: ansible_os_family == "RedHat" and not is_ostree
      block:
        - name: Remove Docker
          ansible.builtin.dnf:
            name: [docker-ce, docker-ce-cli, containerd.io]
            state: absent
          failed_when: false

        - name: Install Podman and virt packages
          ansible.builtin.dnf:
            name: [curl, podman, qemu-kvm, libvirt, virt-install, bridge-utils]
            state: present

    # ─── System deps + Podman (Bazzite/OSTree) ─────────────────────
    - name: Install deps (OSTree)
      when: is_ostree
      block:
        - name: Check missing packages
          ansible.builtin.shell: |
            missing=""
            command -v curl   >/dev/null 2>&1 || missing="$missing curl"
            command -v podman >/dev/null 2>&1 || missing="$missing podman"
            command -v virsh  >/dev/null 2>&1 || missing="$missing libvirt qemu-kvm"
            echo "$missing"
          register: ostree_missing
          changed_when: false

        - name: Layer missing packages
          ansible.builtin.command: "rpm-ostree install --idempotent --allow-inactive {{ ostree_missing.stdout }}"
          when: ostree_missing.stdout | trim | length > 0
          register: rpm_ostree_result

        - name: Check if reboot needed
          ansible.builtin.shell: rpm-ostree status | grep -q Staged
          register: ostree_staged
          changed_when: false
          failed_when: false

        - name: Fail if reboot required
          ansible.builtin.fail:
            msg: "Reboot required. Run: sudo reboot && sudo ./setup.sh"
          when: rpm_ostree_result is changed and ostree_staged.rc == 0

    - name: Enable libvirtd
      ansible.builtin.systemd:
        name: libvirtd
        state: started
        enabled: true
      failed_when: false

    # ─── SELinux ───────────────────────────────────────────────────
    - name: Configure SELinux
      when: ansible_selinux.status == "enabled"
      block:
        - name: Set SELinux booleans
          ansible.posix.seboolean:
            name: "{{ item }}"
            state: true
            persistent: true
          loop: [container_use_cephfs, virt_sandbox_use_all_caps, virt_use_nfs]
          failed_when: false

        - name: Label k3s data dir
          ansible.builtin.command: semanage fcontext -a -t container_var_lib_t '/var/lib/rancher/k3s(/.*)?'
          changed_when: true
          failed_when: false

    # ─── k3s ───────────────────────────────────────────────────────
    - name: Check if k3s running
      ansible.builtin.command: kubectl get nodes
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"
      register: k3s_check
      changed_when: false
      failed_when: false

    - name: Install k3s
      when: k3s_check.rc != 0
      block:
        - name: Install k3s-selinux (Fedora/OSTree)
          when: ansible_selinux.status == "enabled" and ansible_os_family == "RedHat"
          ansible.builtin.shell: |
            if command -v rpm-ostree >/dev/null 2>&1; then
              rpm-ostree install --idempotent --allow-inactive k3s-selinux 2>/dev/null || true
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y -q k3s-selinux 2>/dev/null || true
            fi
          changed_when: false

        - name: Run k3s installer (SELinux)
          ansible.builtin.shell: curl -sfL https://get.k3s.io | INSTALL_K3S_SELINUX_WARN=true sh -s - --selinux
          when: ansible_selinux.status == "enabled"

        - name: Run k3s installer (standard)
          ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -
          when: ansible_selinux.status != "enabled"

        - name: Make kubeconfig readable
          ansible.builtin.file:
            path: "{{ k3s_kubeconfig }}"
            mode: "0644"

        - name: Wait for k3s Ready
          ansible.builtin.shell: kubectl get nodes | grep -q " Ready"
          environment:
            KUBECONFIG: "{{ k3s_kubeconfig }}"
          retries: 40
          delay: 5
          until: k3s_ready.rc == 0
          register: k3s_ready

    - name: Setup kubeconfig for user
      block:
        - name: Create .kube dir
          ansible.builtin.file:
            path: "{{ deploy_home }}/.kube"
            state: directory
            owner: "{{ deploy_user }}"
            mode: "0755"

        - name: Copy kubeconfig
          ansible.builtin.copy:
            src: "{{ k3s_kubeconfig }}"
            dest: "{{ deploy_home }}/.kube/config"
            owner: "{{ deploy_user }}"
            mode: "0600"
            remote_src: true

    # ─── ArgoCD ────────────────────────────────────────────────────
    - name: Check if ArgoCD exists
      ansible.builtin.command: kubectl get namespace argocd
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"
      register: argocd_ns
      changed_when: false
      failed_when: false

    - name: Install ArgoCD
      when: argocd_ns.rc != 0
      block:
        - name: Apply ArgoCD manifests
          ansible.builtin.shell: kubectl kustomize "{{ gitops_dir }}/argocd" | kubectl apply -f -
          environment:
            KUBECONFIG: "{{ k3s_kubeconfig }}"

        - name: Wait for ArgoCD server
          ansible.builtin.command: kubectl -n argocd rollout status deployment/argocd-server --timeout=300s
          environment:
            KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Expose ArgoCD on NodePort 30082
      ansible.builtin.shell: |
        kubectl -n argocd patch svc argocd-server --type='json' \
          -p='[{"op":"replace","path":"/spec/type","value":"NodePort"},
               {"op":"replace","path":"/spec/ports/0/nodePort","value":30082}]'
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"
      changed_when: true
      failed_when: false

    # ─── Root App-of-Apps ──────────────────────────────────────────
    - name: Check if root Application exists
      ansible.builtin.command: kubectl get application root-apps -n argocd
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"
      register: root_app
      changed_when: false
      failed_when: false

    - name: Create root ArgoCD Application
      when: root_app.rc != 0
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: root-apps
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: {{ repo_url }}
            targetRevision: main
            path: gitops/apps
          destination:
            server: https://kubernetes.default.svc
            namespace: argocd
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
        EOF
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    # ─── virtctl ───────────────────────────────────────────────────
    - name: Get KubeVirt version
      ansible.builtin.uri:
        url: "{{ kubevirt_stable_url }}"
        return_content: true
      register: kv_ver

    - name: Install virtctl
      ansible.builtin.get_url:
        url: "https://github.com/kubevirt/kubevirt/releases/download/{{ kv_ver.content | trim }}/virtctl-{{ kv_ver.content | trim }}-linux-{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"
        dest: /usr/local/bin/virtctl
        mode: "0755"
        timeout: 120

    # ─── Shell environment ─────────────────────────────────────────
    - name: Add KUBECONFIG to bashrc
      ansible.builtin.lineinfile:
        path: "{{ deploy_home }}/.bashrc"
        line: 'export KUBECONFIG=/etc/rancher/k3s/k3s.yaml'
        create: true
        owner: "{{ deploy_user }}"

    # ─── Summary ──────────────────────────────────────────────────
    - name: Get node IP
      ansible.builtin.shell: hostname -I | awk '{print $1}'
      register: node_ip
      changed_when: false

    - name: Print summary
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════════════
           DATACENTER BOOTSTRAP COMPLETE
          ═══════════════════════════════════════════════════

           ArgoCD will sync from Git and deploy:
             ✓ KubeVirt    ✓ CDI    ✓ KubeVirt Manager
             ✓ Backstage   ✓ VM definitions

           Web UIs:
             ArgoCD:           http://{{ node_ip.stdout }}:30082
             KubeVirt Manager: http://{{ node_ip.stdout }}:30080
             Backstage:        http://{{ node_ip.stdout }}:30081

           ArgoCD admin password:
             kubectl -n argocd get secret argocd-initial-admin-secret \
               -o jsonpath='{.data.password}' | base64 -d && echo
