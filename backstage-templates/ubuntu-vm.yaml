apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ubuntu-dev-vm
  title: Ubuntu Development VM
  description: Provision an Ubuntu development VM on your local datacenter
  tags:
    - vm
    - ubuntu
    - linux
    - kubevirt
spec:
  owner: platform-team
  type: vm
  parameters:
    - title: Ubuntu VM Configuration
      required:
        - vmName
        - owner
      properties:
        vmName:
          title: VM Name
          type: string
          pattern: '^[a-z0-9][a-z0-9-]*$'
          description: Lowercase letters, numbers, and hyphens only
          ui:autofocus: true
        owner:
          title: Owner
          type: string
          description: Select your name
          enum:
            - engineer-1
            - engineer-2
            - engineer-3
            - engineer-4
            - engineer-5
        cpuCores:
          title: CPU Cores
          type: integer
          default: 2
          enum: [1, 2, 4]
          enumNames: ['1 Core', '2 Cores', '4 Cores']
        memory:
          title: Memory
          type: string
          default: 2Gi
          enum: ['1Gi', '2Gi', '4Gi', '8Gi']
          enumNames: ['1 GB', '2 GB', '4 GB', '8 GB']
        diskSize:
          title: Disk Size
          type: string
          default: 20Gi
          enum: ['10Gi', '20Gi', '40Gi', '80Gi']
          enumNames: ['10 GB', '20 GB', '40 GB', '80 GB']
  steps:
    - id: log-request
      name: Log VM Provisioning Request
      action: debug:log
      input:
        message: |
          Provisioning Ubuntu VM:
            Name: ${{ parameters.vmName }}
            Owner: ${{ parameters.owner }}
            CPU: ${{ parameters.cpuCores }} cores
            Memory: ${{ parameters.memory }}
            Disk: ${{ parameters.diskSize }}
            Image: quay.io/containerdisks/ubuntu:24.04
  output:
    links:
      - title: View in KubeVirt Manager
        url: http://192.168.1.105:30080
