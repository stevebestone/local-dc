apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: linuxmint-dev-vm
  title: Linux Mint Development VM
  description: Provision a Linux Mint development VM on your local datacenter
  tags:
    - vm
    - linuxmint
    - linux
    - kubevirt
spec:
  owner: platform-team
  type: vm
  parameters:
    - title: Linux Mint VM Configuration
      required:
        - vmName
        - owner
      properties:
        vmName:
          title: VM Name
          type: string
          pattern: '^[a-z0-9][a-z0-9-]*$'
          description: Lowercase letters, numbers, and hyphens only
          ui:autofocus: true
        owner:
          title: Owner
          type: string
          description: Select your name
          enum:
            - engineer-1
            - engineer-2
            - engineer-3
            - engineer-4
            - engineer-5
        cpuCores:
          title: CPU Cores
          type: integer
          default: 2
          enum: [2, 4]
          enumNames: ['2 Cores', '4 Cores']
        memory:
          title: Memory
          type: string
          default: 4Gi
          enum: ['2Gi', '4Gi', '8Gi']
          enumNames: ['2 GB', '4 GB', '8 GB']
        diskSize:
          title: Disk Size
          type: string
          default: 40Gi
          enum: ['20Gi', '40Gi', '80Gi']
          enumNames: ['20 GB', '40 GB', '80 GB']
  steps:
    - id: log-request
      name: Log VM Provisioning Request
      action: debug:log
      input:
        message: |
          Provisioning Linux Mint VM:
            Name: ${{ parameters.vmName }}
            Owner: ${{ parameters.owner }}
            CPU: ${{ parameters.cpuCores }} cores
            Memory: ${{ parameters.memory }}
            Disk: ${{ parameters.diskSize }}
            Image: Linux Mint (PVC-based install required)
